apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-grid
  labels:
    app: helios-grid
spec:
  replicas: 3
  selector:
    matchLabels:
      app: helios-grid
  template:
    metadata:
      labels:
        app: helios-grid
    spec:
      containers:
      - name: helios-grid
        image: your-registry/helios-grid:1.0.0
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: helios-grid-service
spec:
  selector:
    app: helios-grid
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helios-grid-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - helios-grid.yourdomain.com
    secretName: helios-grid-tls
  rules:
  - host: helios-grid.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: helios-grid-service
            port:
              number: 80