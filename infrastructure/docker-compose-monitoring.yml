version: '3.8'

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: helios-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    extra_hosts:
      # Allows Prometheus to access our local FastAPI production server on 3002
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:latest
    container_name: helios-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Allow anonymous read access so recruiters can view dashboards instantly without logging in
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
