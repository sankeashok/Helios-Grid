name: 🚀 Deploy React Frontend to Vercel

on:
  push:
    branches: [ main ]
    paths: [ 'react-frontend/**' ]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-vercel:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'react-frontend/package-lock.json'

      - name: 📦 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 📦 Install Dependencies
        working-directory: ./react-frontend
        run: npm ci

      - name: 🏗️ Build React App
        working-directory: ./react-frontend
        run: |
          export REACT_APP_API_URL=https://sankeashook-helios-gridenergy-prediction.hf.space
          CI=false npm run build

      - name: 🚀 Deploy to Vercel (Production)
        working-directory: ./react-frontend
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: ✅ Deployment Success
        run: |
          echo "🎉 VERCEL DEPLOYMENT COMPLETED!"
          echo "🌐 Frontend: Live on Vercel"
          echo "🔗 API: Connected to Hugging Face"
          echo "🚀 Full-stack MLOps platform deployed!"