  #     - name: 🛡️ Security Scan (Bandit)
  #       run: python -m bandit -r . -f json -o bandit-report.json --exclude ./helios-grid-env,./react-frontend/node_modules || true
  # 
  #     - name: 🔒 Dependency Security Check (Safety)
