name: 🚀 Helios-Grid Main CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Core Testing Pipeline
  minimal-test:
    name: 🧪 Core Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 🔍 Environment Debug
        run: |
          echo "=== ENVIRONMENT DEBUG ==="
          echo "Python version: $(python --version)"
          echo "Python executable: $(which python)"
          echo "Pip version: $(pip --version)"
          echo "Current directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "Tests directory:"
          ls -la tests/ || echo "No tests directory"
          echo "Python path:"
          python -c "import sys; print('\n'.join(sys.path))"

      - name: 🧪 Run Minimal Test
        run: |
          python tests/test_minimal.py

  # Dependency Testing
  basic-deps-test:
    name: 📦 Dependency Tests
    runs-on: ubuntu-latest
    needs: minimal-test
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Install Only Pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: 🧪 Run Pytest on Minimal Test
        run: |
          python -m pytest tests/test_minimal.py -v

  # Scientific Package Testing
  scientific-deps-test:
    name: 🔬 Scientific Package Tests
    runs-on: ubuntu-latest
    needs: basic-deps-test
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Install Scientific Packages
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy pandas scikit-learn

      - name: 🔍 Package Versions
        run: |
          echo "=== PACKAGE VERSIONS ==="
          pip list | grep -E "(numpy|pandas|scikit-learn|pytest)"

      - name: 🧪 Test Scientific Imports
        run: |
          python -c "import numpy; print(f'NumPy: {numpy.__version__}')"
          python -c "import pandas; print(f'Pandas: {pandas.__version__}')"
          python -c "import sklearn; print(f'Scikit-learn: {sklearn.__version__}')"

  # Full Test Suite
  full-test:
    name: 🎯 Complete Test Suite
    runs-on: ubuntu-latest
    needs: scientific-deps-test
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock numpy pandas scikit-learn joblib

      - name: 🧪 Run Full Test Suite
        run: |
          python -m pytest tests/test_basic.py -v --tb=short

  # Code Quality Checks (NEW STEP 5)
  code-quality:
    name: 🎨 Code Quality
    runs-on: ubuntu-latest
    needs: full-test
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Install Quality Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: 🎨 Code Formatting Check (Black)
        run: black --check --diff . --exclude="helios-grid-env/"

      - name: 🔍 Basic Linting (Flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=helios-grid-env

  # React Frontend Tests (NEW STEP 6)
  react-tests:
    name: ⚛️ React Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    defaults:
      run:
        working-directory: ./react-frontend
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'react-frontend/package-lock.json'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🧪 Run Tests
        run: npm test -- --coverage --watchAll=false --passWithNoTests

      - name: 🏗️ Build Production
        run: CI=false npm run build

  # Docker Build (NEW STEP 7)
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: react-tests
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔍 Verify Required Files
        run: |
          echo "Checking Docker build requirements..."
          ls -la Dockerfile.production || echo "Missing Dockerfile.production"
          ls -la requirements-docker.txt || echo "Missing requirements-docker.txt"
          ls -la local_test_clean.py || echo "Missing local_test_clean.py"

      - name: 🏗️ Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: false
          load: true
          tags: sankeashok/helios-grid:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Security Scanning (NEW STEP 8)
  security-scan:
    name: 🔒 Security Scanning
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 📦 Install Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: 🛡️ Code Security Scan (Bandit)
        run: |
          bandit -r . -f json -o bandit-report.json --exclude ./helios-grid-env,./react-frontend/node_modules || true
          echo "Bandit scan completed"

      - name: 🔒 Dependency Security Check (Safety)
        run: |
          safety check --json --output safety-report.json || true
          echo "Safety check completed"

      - name: 📊 Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
        if: always()