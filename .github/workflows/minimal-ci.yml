name: ✅ Minimal Working CI/CD

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install tools
        run: pip install black flake8
      
      - name: Check formatting
        run: python -m black --check . --exclude="helios-grid-env/|react-frontend/node_modules/|_temp/"
      
      - name: Basic linting
        run: python -m flake8 . --exclude=helios-grid-env,react-frontend/node_modules,_temp --extend-ignore=F401,E501,W503
      
      - name: Success
        run: echo "✅ CI/CD Pipeline Passed!"