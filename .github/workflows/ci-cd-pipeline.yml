name: 🚀 Helios-Grid CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*', 'hotfix/*' ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.9'
  DOCKER_IMAGE: sankeashok/helios-grid

jobs:
  # 🧪 Code Quality & Security Checks
  code-quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort bandit safety
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🎨 Code Formatting Check (Black)
        run: black --check --diff .

      - name: 📏 Import Sorting Check (isort)
        run: isort --check-only --diff .

      - name: 🔍 Linting (Flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: 🛡️ Security Scan (Bandit)
        run: bandit -r . -f json -o bandit-report.json || true

      - name: 🔒 Dependency Security Check
        run: safety check --json --output safety-report.json || true

      - name: 📊 Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # 🧪 Python Tests
  python-tests:
    name: 🐍 Python Tests
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🧪 Run Tests with Coverage
        run: |
          pytest --cov=src --cov-report=xml --cov-report=html
        continue-on-error: true

      - name: 📊 Upload Coverage Reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python-tests
          name: python-${{ matrix.python-version }}

  # ⚛️ React Frontend Tests
  react-tests:
    name: ⚛️ React Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    defaults:
      run:
        working-directory: ./react-frontend
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: react-frontend/package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🎨 ESLint Check
        run: npm run lint || true

      - name: 🧪 Run Tests
        run: npm test -- --coverage --watchAll=false

      - name: 🏗️ Build Production
        run: npm run build

      - name: 📊 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: react-frontend/build/

  # 🐳 Docker Build & Security Scan
  docker-build:
    name: 🐳 Docker Build & Security
    runs-on: ubuntu-latest
    needs: [python-tests, react-tests]
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🛡️ Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:test
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📊 Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # 🚀 Deploy to Staging
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/')
    environment: staging
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and Push Staging Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:staging
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: 🌐 Deploy to Staging Environment
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "Image: ${{ env.DOCKER_IMAGE }}:staging"
          # Add your staging deployment commands here
          # e.g., kubectl, docker-compose, cloud provider CLI

  # 🏭 Deploy to Production
  deploy-production:
    name: 🏭 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and Push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:v${{ github.run_number }}

      - name: 🏭 Deploy to Production Environment
        run: |
          echo "🏭 Deploying to production environment..."
          echo "Image: ${{ env.DOCKER_IMAGE }}:latest"
          # Add your production deployment commands here

  # 📊 Performance & Load Testing
  performance-tests:
    name: 📊 Performance Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/')
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Run Load Tests
        run: |
          echo "🚀 Running performance tests..."
          # Add load testing commands here (e.g., k6, artillery, locust)

  # 🔄 Auto-merge Feature Branches
  auto-merge:
    name: 🔄 Auto-merge Feature Branch
    runs-on: ubuntu-latest
    needs: [python-tests, react-tests, docker-build]
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'feature/') &&
      github.actor != 'dependabot[bot]'
    steps:
      - name: 🔄 Auto-merge PR
        uses: pascalgn/merge-action@v0.15.6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          merge_method: squash
          merge_commit_message: "🚀 Auto-merge: {pull_request_title} (#{pull_request_number})"

  # 📋 Create Release
  create-release:
    name: 📋 Create Release
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Create Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: 🚀 Helios-Grid v${{ github.run_number }}
          body: |
            ## 🚀 Helios-Grid Release v${{ github.run_number }}
            
            ### ✨ What's New
            - Enterprise-grade energy consumption MLOps pipeline
            - Premium React frontend with mobile-first design
            - Comprehensive security scanning and testing
            - Automated CI/CD with Docker deployment
            
            ### 🐳 Docker Images
            - `sankeashok/helios-grid:latest`
            - `sankeashok/helios-grid:v${{ github.run_number }}`
            
            ### 🌐 Deployment
            ```bash
            docker run -d -p 8000:8000 sankeashok/helios-grid:v${{ github.run_number }}
            ```
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ github.run_number-1 }}...v${{ github.run_number }}
          draft: false
          prerelease: false

  # 📊 Notification
  notify:
    name: 📊 Notify Team
    runs-on: ubuntu-latest
    needs: [create-release]
    if: always()
    steps:
      - name: 📊 Pipeline Status
        run: |
          echo "🎉 Helios-Grid CI/CD Pipeline Complete!"
          echo "Status: ${{ job.status }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"